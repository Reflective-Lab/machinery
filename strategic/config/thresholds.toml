# Red-Flag Threshold Configuration
# Adjust sensitivity for pressure signature detection
version = "1.0"

# Active profile: conservative | balanced | aggressive
active_profile = "balanced"

[profiles.conservative]
warn_spike_threshold = 5
repeated_trigger_threshold = 4
repeated_ack_threshold = 4
repeated_counter_voice_threshold = 4
override_always_flags = true

[profiles.balanced]
warn_spike_threshold = 3
repeated_trigger_threshold = 2
repeated_ack_threshold = 2
repeated_counter_voice_threshold = 2
override_always_flags = true

[profiles.aggressive]
warn_spike_threshold = 2
repeated_trigger_threshold = 1
repeated_ack_threshold = 1
repeated_counter_voice_threshold = 1
override_always_flags = true

[red_flags]
# Multiplier for red-flag filtering (signatures exceeding threshold * multiplier = red flag)
institutional_overrun_multiplier = 2.0
# Gates where high WARN rates indicate SELL/SCALE pressure
sell_scale_gates = ["customer-commitment", "funding-narrative"]
