name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.96.0"
  # Clone sibling repos at the same branch as this PR so cross-repo changes
  # (e.g. RFL-128 contracts/ move) resolve consistently. Falls back to main
  # on direct pushes (github.head_ref is empty) and for repos without the branch.
  REFLECTIVE_SIBLING_REF: ${{ github.head_ref || 'main' }}

jobs:
  ci:
    name: just ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout Reflective sibling dependencies
        run: bash scripts/ci/checkout-reflective-siblings.sh
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - run: just ci
