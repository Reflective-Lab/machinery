train:
  - name: converge
    repo: bedrock-platform/converge
    version: 3.9.3   # PUBLISHED 2026-07-02, 10 crates, tag v3.9.3 (local)
  - name: organism
    repo: bedrock-platform/organism
    version: 1.9.4   # PUBLISHED 2026-07-02, 12 crates, tag v1.9.4 (local)
  - name: axiom    # publishes as axiom-truth
    repo: bedrock-platform/axiom
    version: 0.15.3  # PUBLISHED 2026-07-02, tag v0.15.3 (local)
  - name: helms
    repo: bedrock-platform/helms
    version: 0.2.1   # PUBLISHED 2026-07-03, all 40 crates; next+main pushed; v0.2.1 tagged at ca70b0d; RFL-125 Done
  - name: ferrox-solver   # publishes as converge-ferrox-solver (+ 2 sys crates)
    repo: mosaic-extensions/ferrox-solvers
    version: 0.7.3   # PUBLISHED 2026-07-02 (promoted from candidate — head was coupled to converge 3.9.3 APIs), tag v0.7.3 (local)

# Extensions + atelier ride the train (all PUBLISHED 2026-07-02, tags local):
extensions:
  - { name: prism-analytics,   crate: converge-prism-analytics,   version: 2.0.3 }
  - { name: arbiter-policy,    crate: converge-arbiter-policy,    version: 2.0.3 }
  - { name: mnemos-knowledge,  crate: converge-mnemos-knowledge,  version: 1.2.4 }
  - { name: manifold-adapters, crate: converge-manifold-adapters, version: 1.1.3 }
  - { name: atelier-showcase,  crate: converge-atelier-domain + organism-domain, version: 1.5.0 }

gates:
  - cargo publish --dry-run clean for every member (CP0, RFL-127 — run 2026-07-02) — DONE
  - clean-room `cargo add` consumes the floor from crates.io only — no path deps, no patches (RFL-125) — rerun after helms uploads finish

at_ship:
