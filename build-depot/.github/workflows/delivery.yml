name: Delivery

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy Build-Depot after preflight"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: delivery-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: just delivery-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: extractions/setup-just@v3
      - run: bun install --frozen-lockfile
      - run: just delivery-preflight

  deploy:
    name: just deploy
    runs-on: ubuntu-latest
    needs: preflight
    if: github.event_name == 'workflow_dispatch' && inputs.deploy
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: extractions/setup-just@v3
      - run: bun install --frozen-lockfile
      - run: just deploy
