# cargo-deny configuration (0.19.x)
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check  (or via `just security-audit` once integrated)
#
# Mirrors the mosaic-extensions/prism-analytics shape — see that repo
# for the longer-form rationale. The `[advisories].ignore` list MUST
# stay in sync with `.audit-ignores` (used by `cargo audit` in
# `just security-audit`).

[advisories]
unmaintained = "workspace"
yanked = "warn"
# Each entry must be justified inline. Keep in sync with .audit-ignores.
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "NCSA",
    "Unlicense",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
