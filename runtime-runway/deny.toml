# cargo-deny configuration (0.19.x)
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check  (or via `just security-audit` once integrated)
#
# Mirrors commerce-rails/deny.toml. Landed 2026-07-10 to close the
# runtime-runway deny.toml gap (QF-2026-07-10-01, RP-DEP-CATALOG).
#
# `cargo deny check advisories` reads the RustSec DB and fails on a known
# vulnerability the moment it is published — a pre-merge / local gate that
# catches vulnerable versions BEFORE Dependabot files a PR. The `[advisories]`
# `ignore` list MUST stay in sync with `.audit-ignores` (used by `cargo audit`
# in `just security-audit`).

[advisories]
unmaintained = "workspace"
yanked = "warn"
# Each entry must be justified inline. Keep in sync with .audit-ignores.
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "NCSA",
    "Unlicense",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = true

[bans]
# `warn` (not `deny`) to match commerce-rails: a large workspace has legitimate
# transitive duplicates, so multiple-versions surfaces sprawl without blocking
# builds. Hardening to `deny` (with an explicit `skip` list) is the RP-DEP-CATALOG
# follow-up. `deny = [...]` will list off-catalog alternatives once the catalog
# (build-depot/docs/operations/approved-libraries.md) is enforced.
multiple-versions = "warn"
wildcards = "allow"
