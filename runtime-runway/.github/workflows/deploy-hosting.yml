name: deploy (Firebase Hosting)

# Deploys ops/infra/firebase/apps/public/ to apps-reflective-se.
#
# Triggers:
#   - push to main when files under ops/infra/firebase/apps/public/** change
#   - manually via workflow_dispatch
#
# Required repo secrets:
#   GCP_WORKLOAD_IDENTITY_PROVIDER  — workload identity provider resource name
#   GCP_HOSTING_SERVICE_ACCOUNT    — service account email with Firebase Hosting deploy permissions
#
# The service account must have roles/firebasehosting.admin (or equivalent)
# on the wolfgang-kb-prod project, and a workload identity binding for this
# workflow must be provisioned in ops/ before this workflow can succeed.

on:
  push:
    branches: ["main"]
    paths:
      - "ops/infra/firebase/apps/public/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # for workload identity federation

jobs:
  deploy-hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ops/infra/firebase/apps
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP via workload identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_HOSTING_SERVICE_ACCOUNT }}
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting:apps-reflective-se --project wolfgang-kb-prod --non-interactive
